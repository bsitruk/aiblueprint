name: Scheduled Fork Sync

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to manually trigger the sync via the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the action to push changes back to your fork

    steps:
      - name: Sync upstream changes
        run: gh repo sync ${{ github.repository }} --branch main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}